name: arcana
version: 1.0.0
description: "Full-cycle AI development skills — from requirements to merge, with test-first workflows, AC validation, mutation testing, and wave-based parallel execution"
license: MIT
compatibility:
  - Claude Code CLI
requires:
  - git

agents:
  arc-archmage:
    source: ./
    files:
      - agents/arc-archmage.md
  arc-mage:
    source: ./
    files:
      - agents/arc-mage.md
  arc-apprentice:
    source: ./
    files:
      - agents/arc-apprentice.md

skills:
  arc-ac:
    source: ./
    files:
      - skills/arc-ac/SKILL.md
      - skills/arc-ac/enrich.md
      - skills/arc-ac/references/three-questions.md
