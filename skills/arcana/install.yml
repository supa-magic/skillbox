      - skills/arc-ac/update.md
      - skills/arc-ac/validate.md
      - skills/arc-ac/verify.md
  arc-project:
    source: ./
    files:
      - skills/arc-project/SKILL.md
      - skills/arc-project/adr.md
      - skills/arc-project/audit.md
      - skills/arc-project/init.md
      - skills/arc-project/setup.md
      - skills/arc-project/skill-up.md
  arc-code:
    source: ./
