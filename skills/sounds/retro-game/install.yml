name: retro-game-sounds
version: 1.0.0
description: "Retro game sound effects that help track AI coding assistant state via hook events"
license: MIT
compatibility:
  - Claude Code
requires:
  - node@18

hooks:
  retro-game-sounds:
    source: ./
    files:
      - player.mjs
      - attention.wav
      - compacted.wav
      - complete.wav
      - error.wav
      - permission.wav
      - subagent-complete.wav

setup: SETUP.md
