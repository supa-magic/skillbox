name: retro-game-sounds
version: 1.0.0
description: "Retro game sound effects that help track AI coding assistant state via hook events"
license: MIT
compatibility:
  - Claude Code
  - Cursor
  - Windsurf
  - Cline
  - OpenCode
requires:
  - node@18

hooks:
  retro-game-sounds:
    source: ./
    files:
      - player.mjs
      - attention.wav
      - compacted.wav
      - complete.wav
      - error.wav
      - permission.wav
      - subagent-complete.wav

setup:
  claude: setup/claude.md
  cursor: setup/cursor.md
  windsurf: setup/windsurf.md
  cline: setup/cline.md
  opencode: setup/opencode.md
